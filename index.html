<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Blog preview card</title>


</head>
<body>
  <main class="blog-page">
    <article class="blog-card">
      <figure class="blog-image">
        <img src="assets/images/illustration-article.svg" alt="Abstract illustration for HTML and CSS foundations article">
      </figure>
      <section class="card-content">
        <span class="ctg-tg">Learning</span>
        <p class="publish-date">Published 21 Dec 2023</p>
        <h1 class="card-header"><a href="#">HTML & CSS foundations</a></h1>
        <p class="card-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </section>
      <footer class="author">
        <img src="assets/images/image-avatar.webp" alt="Greg Hooper profile picture">
        <p class="author-name">Greg Hooper</p>
      </footer>
    </article>
  </main> 
</body>
</html>
